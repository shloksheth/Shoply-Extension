<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Shoply</title>
<link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="app">

    <!-- Header -->
    <header class="header">
      <div class="wordmark">
        <span class="wordmark-tag">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M8.2 1H17C17.55 1 18 1.45 18 2V10.8C18 11.2 17.83 11.58 17.54 11.85L11.2 18.19C10.6 18.79 9.63 18.79 9.03 18.19L1.81 10.97C1.21 10.37 1.21 9.4 1.81 8.8L8.15 2.46C8.42 2.17 8.8 2 9.2 2" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round" transform="translate(0,-1)"/>
            <circle cx="13" cy="6" r="1.7" fill="currentColor"/>
          </svg>
        </span>
        <span class="wordmark-text">Shoply</span>
      </div>
      <button class="icon-btn" id="settingsToggle" title="Manage lists" aria-label="Manage lists">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><circle cx="4" cy="9" r="1.6" fill="currentColor"/><circle cx="9" cy="9" r="1.6" fill="currentColor"/><circle cx="14" cy="9" r="1.6" fill="currentColor"/></svg>
      </button>
    </header>

    <!-- Add current page -->
    <section class="add-strip" id="addStrip">
      <div class="add-strip-info">
        <img id="siteFavicon" class="site-favicon" alt="" />
        <div class="add-strip-text">
          <p class="add-strip-label">On this page</p>
          <p class="add-strip-domain" id="siteDomain">—</p>
        </div>
      </div>
      <div class="add-select-wrap">
        <select id="addListSelect" class="add-select"></select>
        <button id="addPageBtn" class="btn-primary">Add site</button>
      </div>
      <p class="add-status" id="addStatus"></p>
    </section>

    <!-- List tabs -->
    <nav class="tabs" id="listTabs"></nav>

    <!-- New list inline form -->
    <form class="new-list-form hidden" id="newListForm">
      <input type="text" id="newListName" placeholder="Name this list…" maxlength="40" autocomplete="off" />
      <div class="emoji-row" id="emojiRow"></div>
      <div class="new-list-actions">
        <button type="button" class="btn-ghost" id="cancelNewList">Cancel</button>
        <button type="submit" class="btn-primary">Create list</button>
      </div>
    </form>

    <!-- List toolbar -->
    <div class="list-toolbar" id="listToolbar">
      <div class="list-title-wrap">
        <span id="activeListEmoji" class="active-emoji">✦</span>
        <h2 id="activeListName" class="list-title">Wishlist</h2>
        <span class="item-count" id="itemCount">0</span>
      </div>
      <div class="view-toggle" role="tablist" aria-label="View mode">
        <button class="view-toggle-btn" data-mode="icon" id="modeIconBtn" role="tab">
          <svg width="15" height="15" viewBox="0 0 15 15" fill="none"><rect x="1" y="1" width="6" height="6" rx="1.2" stroke="currentColor" stroke-width="1.4"/><rect x="8" y="1" width="6" height="6" rx="1.2" stroke="currentColor" stroke-width="1.4"/><rect x="1" y="8" width="6" height="6" rx="1.2" stroke="currentColor" stroke-width="1.4"/><rect x="8" y="8" width="6" height="6" rx="1.2" stroke="currentColor" stroke-width="1.4"/></svg>
        </button>
        <button class="view-toggle-btn" data-mode="link" id="modeLinkBtn" role="tab">
          <svg width="15" height="15" viewBox="0 0 15 15" fill="none"><line x1="1.5" y1="3.5" x2="13.5" y2="3.5" stroke="currentColor" stroke-width="1.4"/><line x1="1.5" y1="7.5" x2="13.5" y2="7.5" stroke="currentColor" stroke-width="1.4"/><line x1="1.5" y1="11.5" x2="13.5" y2="11.5" stroke="currentColor" stroke-width="1.4"/></svg>
        </button>
      </div>
    </div>

    <!-- Delete list control -->
    <button class="delete-list-btn hidden" id="deleteListBtn">Delete this list</button>

    <!-- Items -->
    <main class="items-wrap" id="itemsWrap">
      <div class="empty-state" id="emptyState">
        <div class="empty-mark">✦</div>
        <p class="empty-title">Nothing saved yet</p>
        <p class="empty-sub">Visit a product page and hit “Add site” above.</p>
      </div>
      <div class="items-grid hidden" id="itemsGrid"></div>
      <div class="items-list hidden" id="itemsList"></div>
    </main>

  </div>

  <script src="popup.js"></script>
</body>
</html>
